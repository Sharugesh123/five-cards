<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#E8B800" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="5 Cards" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <title>5 Cards</title>
    <style>
      *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
      html,body,#root{width:100%;height:100%;margin:0;padding:0;overflow:hidden;}
      body{overscroll-behavior:none;touch-action:manipulation;background:#E8B800;}
    </style>
  </head>
  <body>
    <noscript>JavaScript required.</noscript>
    <div id="root"></div>
    <script>
      if('serviceWorker' in navigator)
        window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
    </script>
  </body>
</html>
